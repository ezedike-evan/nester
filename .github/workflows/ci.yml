name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/contracts/**'
      - '.github/workflows/ci.yml'
      - 'Makefile'
  pull_request:
    branches: [main, dev]
    paths:
      - 'packages/contracts/**'
      - '.github/workflows/ci.yml'
      - 'Makefile'

jobs:
  website:
    name: Website (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @nester/website build

      - name: Lint website
        run: pnpm --filter @nester/website lint

  intelligence:
    name: Intelligence (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/intelligence
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/intelligence/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  dapp-frontend:
    name: Dapp Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dapp/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  dapp-backend:
    name: Dapp Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dapp/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/dapp/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  soroban-contracts:
    name: Soroban Contracts (Rust/WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format Check
        run: make fmt-check

      - name: Clippy
        run: make clippy

      - name: Build Contracts
        run: make build

      - name: Run Unit Tests
        run: make test

      - name: Run Integration Tests
        run: make integration-test

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm
          path: |
            target/wasm32-unknown-unknown/release/*.wasm
